<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VHN Nutrition Compare</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f5f7fa;color:#2d3748;font-size:14px}
header{background:#1a365d;color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px}
header h1{font-size:18px;font-weight:700}
header span{font-size:12px;opacity:.7}
.container{max-width:1400px;margin:0 auto;padding:16px}

/* Filter bar */
.filter-bar{background:#fff;border-radius:10px;padding:14px 18px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.08);display:flex;flex-wrap:wrap;gap:14px;align-items:center}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-group label{font-size:11px;font-weight:600;color:#718096;text-transform:uppercase;letter-spacing:.04em}
.pills{display:flex;flex-wrap:wrap;gap:5px}
.pill{padding:4px 11px;border-radius:20px;border:1.5px solid #cbd5e0;background:#fff;cursor:pointer;font-size:12px;font-weight:500;color:#4a5568;transition:all .15s}
.pill.active{background:#1a365d;color:#fff;border-color:#1a365d}
.pill-brand-rc.active{background:#dd6b20;border-color:#dd6b20}
.pill-brand-hills.active{background:#276749;border-color:#276749}
.pill-brand-purina.active{background:#2b6cb0;border-color:#2b6cb0}

/* View toggle */
.view-toggle{margin-left:auto;display:flex;gap:6px}
.btn{padding:5px 13px;border-radius:6px;border:1.5px solid #cbd5e0;background:#fff;cursor:pointer;font-size:12px;font-weight:600;color:#4a5568;transition:all .15s}
.btn.active,.btn:hover{background:#1a365d;color:#fff;border-color:#1a365d}

/* Mode tabs */
.mode-tabs{display:flex;gap:8px;margin-bottom:14px}
.tab{padding:7px 16px;border-radius:8px;border:1.5px solid #cbd5e0;background:#fff;cursor:pointer;font-size:13px;font-weight:600;color:#718096;transition:all .15s}
.tab.active{background:#1a365d;color:#fff;border-color:#1a365d}

/* Cards grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}
.card{background:#fff;border-radius:10px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.08);border:2px solid transparent;cursor:pointer;transition:all .15s;position:relative}
.card:hover{box-shadow:0 3px 10px rgba(0,0,0,.14)}
.card.selected{border-color:#1a365d;box-shadow:0 0 0 3px rgba(26,54,93,.15)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.card-name{font-weight:700;font-size:13px;line-height:1.3}
.tag{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.tag-purina{background:#bee3f8;color:#1a365d}
.tag-rc{background:#feebc8;color:#7b341e}
.tag-hills{background:#c6f6d5;color:#1a4731}
.indication{font-size:11px;color:#718096;margin:4px 0 10px;line-height:1.4}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.metric{background:#f7fafc;border-radius:6px;padding:7px 9px}
.metric-label{font-size:10px;color:#718096;font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.metric-val{font-size:17px;font-weight:800;color:#1a365d;margin-top:1px}
.metric-unit{font-size:10px;color:#a0aec0}
.energy-bar-wrap{margin-top:10px}
.energy-bar-label{font-size:10px;color:#718096;margin-bottom:3px;display:flex;justify-content:space-between}
.energy-bar{height:6px;border-radius:3px;background:#e2e8f0;overflow:hidden}
.energy-bar-fill{height:100%;background:linear-gradient(90deg,#1a365d,#4299e1);border-radius:3px;transition:width .4s}
.check-badge{position:absolute;top:10px;right:10px;width:20px;height:20px;border-radius:50%;background:#1a365d;color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.card.selected .check-badge{opacity:1}
.form-badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;margin-left:4px}
.form-dry{background:#ebf8ff;color:#2b6cb0}
.form-wet{background:#e6fffa;color:#276749}

/* Comparison table */
.compare-panel{background:#fff;border-radius:10px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.compare-panel h2{font-size:15px;font-weight:700;margin-bottom:14px;color:#1a365d}
.cmp-table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:600px}
th,td{padding:9px 12px;text-align:center;font-size:12px;border-bottom:1px solid #e2e8f0}
th{background:#f7fafc;font-weight:700;color:#4a5568;text-transform:uppercase;letter-spacing:.03em;font-size:11px}
td:first-child,th:first-child{text-align:left;width:150px}
.td-val{font-weight:700;font-size:13px}
.bar-cell{display:flex;align-items:center;gap:6px}
.bar-mini{flex:1;height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden;min-width:60px}
.bar-mini-fill{height:100%;border-radius:4px}
.bar-protein{background:#4299e1}
.bar-fat{background:#ed8936}
.bar-carbs{background:#48bb78}
.bar-fiber{background:#9f7aea}
.bar-energy{background:#f56565}
tr.highlight{background:#ebf8ff}

/* Chart section */
.chart-section{background:#fff;border-radius:10px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-top:14px}
.chart-section h2{font-size:15px;font-weight:700;margin-bottom:14px;color:#1a365d}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.chart-box{position:relative;height:320px}
@media(max-width:700px){.chart-grid{grid-template-columns:1fr}}

/* Action bar */
.action-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.selected-count{font-size:13px;color:#4a5568;font-weight:600}
.btn-clear{padding:5px 12px;border-radius:6px;border:1.5px solid #e53e3e;background:#fff;cursor:pointer;font-size:12px;font-weight:600;color:#e53e3e}
.btn-clear:hover{background:#e53e3e;color:#fff}
.empty{text-align:center;padding:60px 20px;color:#a0aec0}
.empty svg{margin-bottom:12px;opacity:.3}

/* Tooltip */
.tooltip-note{font-size:10px;color:#a0aec0;margin-top:6px;font-style:italic}
</style>
</head>

        <div class="pill pill-brand-rc" data-val="Royal Canin" onclick="setBrand('Royal Canin',this)">Royal Canin</div>

      </div>
    </div>
    <div class="filter-group">
      <label>Species</label>
      <div class="pills" id="speciesPills">
        <div class="pill active" onclick="setSpecies('all',this)">All</div>
        <div class="pill" onclick="setSpecies('Dog',this)">Dog</div>
        <div class="pill" onclick="setSpecies('Cat',this)">Cat</div>
      </div>
    </div>
    <div class="filter-group">
      <label>Form</label>
      <div class="pills" id="formPills">
        <div class="pill active" onclick="setForm('all',this)">All</div>
        <div class="pill" onclick="setForm('Dry',this)">Dry</div>
        <div class="pill" onclick="setForm('Wet',this)">Wet</div>
      </div>
    </div>
    <div class="filter-group" style="flex:1;min-width:160px">
      <label>Search</label>
      <input id="searchBox" type="text" placeholder="ชื่อสูตร / Indication..." oninput="renderCards()"
        style="padding:5px 10px;border:1.5px solid #cbd5e0;border-radius:6px;font-size:13px;width:100%">
    </div>
    <div class="view-toggle">
      <button class="btn active" onclick="setView('card',this)">Cards</button>
      <button class="btn" onclick="setView('compare',this)">Compare</button>
    </div>
  </div>

  <div class="mode-tabs">
    <div class="tab active" onclick="setMetric('100kcal',this)">per 100 kcal ME</div>
    <div class="tab" onclick="setMetric('100g',this)">per 100g (as fed)</div>
  </div>

  <div id="cardView">
    <div class="action-bar">
      <span class="selected-count" id="selCount">0 selected</span>
      <button class="btn-clear" onclick="clearSelection()">Clear</button>
      <span style="font-size:12px;color:#a0aec0">Click cards to select for comparison</span>
    </div>
    <div class="grid" id="cardGrid"></div>
  </div>

  <div id="compareView" style="display:none">
    <div class="compare-panel">
      <h2>📊 Comparison Table</h2>
      <div class="cmp-table-wrap">
        <table id="cmpTable"></table>
      </div>
    </div>
    <div class="chart-section">
      <h2>Charts</h2>
      <div class="chart-grid">

        <div class="chart-box"><canvas id="chartCarbs"></canvas></div>
        <div class="chart-box"><canvas id="chartMacro"></canvas></div>
      </div>
    </div>
  </div>
</div>

   energy_per_100g:78,
   protein_per_100kcal:10.7, fat_per_100kcal:3.7, carbs_per_100kcal:8.8, fiber_per_100kcal:2.6},
  {id:'hi_met_cat_wet2', brand:"Hill's", name:'Metabolic Weight Management - Chicken Pâté', species:'Cat', form:'Wet',
   indication:'Obesity / Overweight',
   energy_per_100g:87,
   protein_per_100kcal:10.7, fat_per_100kcal:3.9, carbs_per_100kcal:8.6, fiber_per_100kcal:2.9},
  {id:'hi_onc_cat_wet1', brand:"Hill's", name:'ONC Care - Chicken & Vegetable Stew', species:'Cat', form:'Wet',
   indication:'Oncology / Cancer Support',
   energy_per_100g:94,
   protein_per_100kcal:9.5, fat_per_100kcal:5.6, carbs_per_100kcal:5.5, fiber_per_100kcal:0.4},
  {id:'hi_yd_cat_wet1', brand:"Hill's", name:'y/d Thyroid Care - Chicken Pâté', species:'Cat', form:'Wet',
   indication:'Hyperthyroidism',
   energy_per_100g:124,
   protein_per_100kcal:7.3, fat_per_100kcal:5.9, carbs_per_100kcal:6.8, fiber_per_100kcal:0.7},
  {id:'hi_mo_cat_wet2', brand:"Hill's", name:'Multi-Organ - Chicken Pâté', species:'Cat', form:'Wet',
   indication:'Multi-Organ Support',
   energy_per_100g:110,
   protein_per_100kcal:9.7, fat_per_100kcal:6.2, carbs_per_100kcal:3.8, fiber_per_100kcal:1.8},
  {id:'hi_brain_jd_cat_wet2', brand:"Hill's", name:'Brain Care + j/d - Tuna & Vegetable Stew', species:'Cat', form:'Wet',
   indication:'Cognitive Support / Osteoarthritis',
   energy_per_100g:80,
   protein_per_100kcal:9.6, fat_per_100kcal:4.0, carbs_per_100kcal:9.1, fiber_per_100kcal:0.2},

];

// Compute per100g from per100kcal × energy/100
FOODS.forEach(f=>{
  ['protein','fat','carbs','fiber'].forEach(n=>{
    const key = n+'_per_100g';
    const kkcal = n+'_per_100kcal';
    if(f.energy_per_100g && f[kkcal]!=null){
      f[key] = parseFloat((f[kkcal] * f.energy_per_100g / 100).toFixed(2));
    } else {
      f[key] = null;
    }
  });
});

// ─── STATE ───────────────────────────────────────────────────────────────────
let filterBrand='all', filterSpecies='all', filterForm='all';
let selectedIds = new Set();
let currentMetric = '100kcal';
let currentView = 'card';
let charts = {};

// ─── FILTERS ─────────────────────────────────────────────────────────────────
function setBrand(v,el){
  filterBrand=v;
  document.querySelectorAll('#brandPills .pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active'); renderCards();
}
function setSpecies(v,el){
  filterSpecies=v;
  document.querySelectorAll('#speciesPills .pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active'); renderCards();
}
function setForm(v,el){
  filterForm=v;
  document.querySelectorAll('#formPills .pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active'); renderCards();
}
function setMetric(v,el){
  currentMetric=v;
  document.querySelectorAll('.mode-tabs .tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active'); renderCards(); renderCompare();
}
function setView(v,el){
  currentView=v;
  document.querySelectorAll('.view-toggle .btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('cardView').style.display = v==='card'?'':'none';
  document.getElementById('compareView').style.display = v==='compare'?'':'none';
  if(v==='compare') renderCompare();
}

function getFiltered(){
  const q=(document.getElementById('searchBox').value||'').toLowerCase();
  return FOODS.filter(f=>{
    if(filterBrand!=='all' && f.brand!==filterBrand) return false;
    if(filterSpecies!=='all' && f.species!==filterSpecies) return false;
    if(filterForm!=='all' && f.form!==filterForm) return false;
    if(q && !f.name.toLowerCase().includes(q) && !f.indication.toLowerCase().includes(q) && !f.brand.toLowerCase().includes(q)) return false;
    return true;
  });
}

function getVal(f, nutrient){
  return currentMetric==='100kcal' ? f[nutrient+'_per_100kcal'] : f[nutrient+'_per_100g'];
}
function getUnit(){ return currentMetric==='100kcal' ? 'g/100kcal' : 'g/100g'; }

// ─── CARDS ───────────────────────────────────────────────────────────────────
const MAX_ENERGY=600;
function renderCards(){
  const foods=getFiltered();
  const grid=document.getElementById('cardGrid');
  document.getElementById('selCount').textContent=selectedIds.size+' selected';
  if(!foods.length){
    grid.innerHTML='<div class="empty"><svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg><p>ไม่พบข้อมูลที่ตรงกัน</p></div>';
    return;
  }
  grid.innerHTML=foods.map(f=>{
    const tagClass = f.brand==='Purina'?'tag-purina':f.brand==='Royal Canin'?'tag-rc':'tag-hills';
    const brandShort = f.brand==='Purina'?'Purina':f.brand==='Royal Canin'?'RC':"Hill's";
    const sel=selectedIds.has(f.id);
    const energyW = f.energy_per_100g? Math.min(100,f.energy_per_100g/MAX_ENERGY*100):0;
    const p=getVal(f,'protein'), fa=getVal(f,'fat'), c=getVal(f,'carbs'), fi=getVal(f,'fiber');
    const fmtBadge=`<span class="form-badge form-${f.form.toLowerCase()}">${f.form}</span>`;
    return `<div class="card${sel?' selected':''}" onclick="toggleCard('${f.id}')">
      <div class="check-badge">✓</div>
      <div class="card-header">
        <div class="card-name">${f.name}${fmtBadge}</div>
        <span class="tag ${tagClass}">${brandShort}</span>
      </div>
      <div class="indication">${f.species} · ${f.indication}</div>
      <div class="metrics">
        <div class="metric">
          <div class="metric-label">🥩 Protein</div>
          <div class="metric-val">${p!=null?p.toFixed(1):'—'}</div>
          <div class="metric-unit">${getUnit()}</div>
        </div>
        <div class="metric">
          <div class="metric-label">🧈 Fat</div>
          <div class="metric-val">${fa!=null?fa.toFixed(1):'—'}</div>
          <div class="metric-unit">${getUnit()}</div>
        </div>
        <div class="metric">
          <div class="metric-label">🌾 Carbs</div>
          <div class="metric-val">${c!=null?c.toFixed(1):'—'}</div>
          <div class="metric-unit">${getUnit()}</div>
        </div>
        <div class="metric">
          <div class="metric-label">⚡ Energy</div>
          <div class="metric-val">${f.energy_per_100g!=null?f.energy_per_100g:'—'}</div>
          <div class="metric-unit">kcal/100g</div>
        </div>
      </div>
      <div class="energy-bar-wrap">
        <div class="energy-bar-label">
          <span>Calorie Density</span>
          <span>${f.energy_per_100g!=null?f.energy_per_100g+' kcal/100g':'N/A'}</span>
        </div>
        <div class="energy-bar"><div class="energy-bar-fill" style="width:${energyW}%"></div></div>
      </div>
    </div>`;
  }).join('');
}

function toggleCard(id){
  if(selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  renderCards();
  if(currentView==='compare') renderCompare();
}

function clearSelection(){selectedIds.clear();renderCards();if(currentView==='compare')renderCompare();}

// ─── COMPARE TABLE ────────────────────────────────────────────────────────────
function renderCompare(){
  const sel=FOODS.filter(f=>selectedIds.has(f.id));
  const tbl=document.getElementById('cmpTable');
  if(!sel.length){
    tbl.innerHTML='<tr><td colspan="2" class="empty" style="padding:40px;color:#a0aec0;text-align:center">Select cards to compare</td></tr>';
    destroyCharts(); return;
  }
  const unit=getUnit();
  const rows=[
    {label:'Brand', key:'brand', isText:true},
    {label:'Species', key:'species', isText:true},
    {label:'Form', key:'form', isText:true},
    {label:'Indication', key:'indication', isText:true},
    {label:`Protein (${unit})`, key:'protein', color:'#4299e1', max:20},
    {label:`Fat (${unit})`, key:'fat', color:'#ed8936', max:10},
    {label:`Carbs (${unit})`, key:'carbs', color:'#48bb78', max:20},
    {label:`Fiber (${unit})`, key:'fiber', color:'#9f7aea', max:5},
    {label:'Energy (kcal/100g)', key:'energy', color:'#f56565', max:600},
  ];

  const header='<tr><th>Nutrient</th>'+sel.map(f=>{
    const tagC=f.brand==='Purina'?'tag-purina':f.brand==='Royal Canin'?'tag-rc':'tag-hills';
    return `<th><span class="tag ${tagC}">${f.brand==='Purina'?'Purina':f.brand==='Royal Canin'?'RC':"Hill's"}</span><br>${f.name}<br><span style="font-weight:400;color:#718096">${f.species} · ${f.form}</span></th>`;
  }).join('')+'</tr>';

  const body=rows.map((r,ri)=>{
    const cells=sel.map(f=>{
      if(r.isText) return `<td>${f[r.key]||''}</td>`;
      const rawVal = r.key==='energy' ? f.energy_per_100g : getVal(f,r.key);
      if(rawVal==null) return '<td>—</td>';
      const pct=Math.min(100,rawVal/r.max*100);
      return `<td><div class="bar-cell">
        <span class="td-val">${rawVal.toFixed(1)}</span>
        <div class="bar-mini"><div class="bar-mini-fill bar-${r.key==='energy'?'energy':r.key}" style="width:${pct}%"></div></div>
      </div></td>`;
    }).join('');
    const isNum=!r.isText;
    return `<tr${isNum&&ri%2===0?' class="highlight"':''}><td><strong>${r.label}</strong></td>${cells}</tr>`;
  }).join('');

  tbl.innerHTML=header+body;
  renderCharts(sel);
}

// ─── CHARTS ──────────────────────────────────────────────────────────────────
const BRAND_COLORS={
  'Purina':'rgba(66,153,225,0.8)',
  'Royal Canin':'rgba(237,137,54,0.8)',
  "Hill's":'rgba(72,187,120,0.8)',
};
function getBgColor(f){return BRAND_COLORS[f.brand]||'rgba(100,100,100,0.7)';}

function destroyCharts(){Object.values(charts).forEach(c=>c&&c.destroy());charts={};}

function renderCharts(sel){
  destroyCharts();
  const labels=sel.map(f=>`${f.name}\n(${f.brand==='Royal Canin'?'RC':f.brand})`);
  const bgColors=sel.map(f=>getBgColor(f));
  const unit=getUnit();

  function makeBar(id,label,data,color){
    const ctx=document.getElementById(id).getContext('2d');
    return new Chart(ctx,{type:'bar',data:{
      labels,
      datasets:[{label,data,backgroundColor:bgColors,borderColor:bgColors.map(c=>c.replace('0.8','1')),borderWidth:1}]
    },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},
      title:{display:true,text:label,font:{size:13,weight:'bold'},color:'#2d3748'}},
      scales:{y:{beginAtZero:true,ticks:{font:{size:10}},title:{display:true,text:unit,font:{size:10}}},
        x:{ticks:{font:{size:9},maxRotation:30}}}}});
  }

  charts.protein=makeBar('chartProtein','🥩 Protein',sel.map(f=>getVal(f,'protein')),'protein');
  charts.fat=makeBar('chartFat','🧈 Fat',sel.map(f=>getVal(f,'fat')),'fat');
  charts.carbs=makeBar('chartCarbs','🌾 Carbs (NFE)',sel.map(f=>getVal(f,'carbs')),'carbs');

  // Stacked macros chart
  const ctx4=document.getElementById('chartMacro').getContext('2d');
  charts.macro=new Chart(ctx4,{type:'bar',
    data:{labels,datasets:[
      {label:'Protein',data:sel.map(f=>getVal(f,'protein')),backgroundColor:'rgba(66,153,225,0.85)'},
      {label:'Fat',data:sel.map(f=>getVal(f,'fat')),backgroundColor:'rgba(237,137,54,0.85)'},
      {label:'Carbs',data:sel.map(f=>getVal(f,'carbs')),backgroundColor:'rgba(72,187,120,0.85)'},
      {label:'Fiber',data:sel.map(f=>getVal(f,'fiber')),backgroundColor:'rgba(159,122,234,0.85)'},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{font:{size:10}}},
        title:{display:true,text:'Macronutrients (Stacked)',font:{size:13,weight:'bold'},color:'#2d3748'}},
      scales:{x:{stacked:true,ticks:{font:{size:9},maxRotation:30}},
        y:{stacked:true,beginAtZero:true,title:{display:true,text:unit,font:{size:10}}}}
    }
  });
}

// ─── INIT ────────────────────────────────────────────────────────────────────
renderCards();
</script>
